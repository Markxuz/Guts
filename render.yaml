services:
  - type: pserv
    name: db
    env: docker
    dockerfilePath: ./infra/render/mysql/Dockerfile
    plan: starter
    autoDeploy: true
    disk:
      name: db-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        sync: false
      - key: DB_NAME
        value: guts_db
      - key: DB_USER
        value: guts_app
      - key: DB_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        value: guts_db
      - key: MYSQL_USER
        value: guts_app
      - key: MYSQL_PASSWORD
        sync: false

  - type: web
    name: backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: sh -c "npm run migrate && npm start"
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: APP_VERSION
        value: 1.0.0
      - key: DB_HOST
        fromService:
          type: pserv
          name: db
          property: host
      - key: DB_NAME
        value: guts_db
      - key: DB_USER
        value: guts_app
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: DB_SYNC
        value: "false"
      - key: DB_BOOTSTRAP_SYNC
        value: "true"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: LOGIN_RATE_LIMIT_WINDOW_MINUTES
        value: 15
      - key: LOGIN_RATE_LIMIT_MAX_ATTEMPTS
        value: 5
      - key: SEED_DEFAULT_USERS
        value: "true"
      - key: SEED_ADMIN_EMAIL
        value: admin@guts.local
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_STAFF_EMAIL
        value: staff@guts.local
      - key: SEED_STAFF_PASSWORD
        sync: false
      - key: BACKUP_DIR
        value: /app/backups
      - key: MYSQL_DUMP_COMMAND
        value: mariadb-dump
      - key: MYSQL_DUMP_EXTRA_ARGS
        value: --skip-ssl --no-tablespaces
      - key: BACKUP_RETENTION_DAYS
        value: 14
      - key: BACKUP_MAX_AGE_HOURS
        value: 26
      - key: LOG_LEVEL
        value: info
      - key: REQUEST_LOG_INCLUDE_HEALTH
        value: "false"
      - key: BACKUP_ALERT_WEBHOOK_URL
        sync: false
      - key: REPORT_EMAIL_WORKER_ENABLED
        value: "true"
      - key: REPORT_EMAIL_POLL_INTERVAL_MS
        value: 60000
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_SECURE
        value: "false"

  - type: web
    name: frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: starter
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: VITE_API_BASE_URL
        value: /api
